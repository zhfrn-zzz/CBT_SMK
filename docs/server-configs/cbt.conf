# =============================================================================
# Nginx Site Configuration — CBT SMK LMS
# Path: /etc/nginx/sites-available/cbt.conf
# Symlink: ln -s /etc/nginx/sites-available/cbt.conf /etc/nginx/sites-enabled/
# =============================================================================

server {
    listen 80;
    server_name cbt.sekolah.sch.id;
    root /var/www/smk-lms/public;
    index index.php;

    # === Vite Static Assets (hashed filenames → immutable cache) ===
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # === General Static Assets ===
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # === Storage (uploaded question images) ===
    location /storage/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # === Auto-save Rate Limit ===
    location ~ ^/siswa/ujian/\d+/save-answers$ {
        limit_req zone=autosave burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # === WebSocket (Laravel Reverb) ===
    location /app/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # === PHP-FPM ===
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 5;
        fastcgi_read_timeout 30;
        fastcgi_send_timeout 15;
    }

    # === Default Route (Laravel) ===
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # === FPM Status (internal only) ===
    location /fpm-status {
        allow 127.0.0.1;
        deny all;
        fastcgi_pass php-fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # === Deny dotfiles ===
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

