# =============================================================================
# Redis 7.x Configuration — CBT SMK LMS
# Server: Intel Xeon 20-core, 16GB RAM, HDD
# Role: Cache + session + queue + exam answer buffer (NOT primary storage)
# Path: /etc/redis/redis.conf
# =============================================================================

# === Network ===
bind 127.0.0.1 -::1
port 6379
protected-mode yes

# === Connection ===
maxclients 1000
timeout 300
tcp-keepalive 60

# === Memory ===
# 512MB is generous — estimated usage ~92MB for 500 concurrent.
# Headroom for Laravel cache, session, and queue metadata.
maxmemory 512mb

# allkeys-lru: evict least recently used keys when memory is full.
# Safe because exam data has TTL and can be re-saved from client.
maxmemory-policy allkeys-lru

# === Persistence ===
# DISABLE RDB snapshots during production exam — save to HDD = blocking.
# Exam data is backed up to MySQL via PersistAnswersJob.
save ""

# Disable AOF — Redis is used as cache+buffer, not primary storage.
appendonly no

# === Performance ===
hz 10

# === Logging ===
loglevel notice
logfile /var/log/redis/redis-server.log

# === Danger Zone ===
# Disable potentially dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "CBT_CONFIG"
