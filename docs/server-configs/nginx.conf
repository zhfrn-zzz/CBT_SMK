# =============================================================================
# Nginx Main Configuration — CBT SMK LMS
# Server: Intel Xeon 20-core, 16GB RAM, HDD
# Path: /etc/nginx/nginx.conf
# =============================================================================

worker_processes auto;              # = CPU cores (20 on Xeon)
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    # === Basic ===
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    # === Logging ===
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # === Timeouts ===
    keepalive_timeout 30;
    keepalive_requests 1000;
    client_body_timeout 15;
    client_header_timeout 15;
    send_timeout 15;

    # === Buffer Sizes ===
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 10m;       # Upload soal + gambar

    # === Gzip ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # === Brotli (uncomment if ngx_brotli module is installed) ===
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript;

    # === Rate Limiting ===
    # Auto-save: max 3 req/s per IP (1 save per 30s, generous buffer)
    limit_req_zone $binary_remote_addr zone=autosave:10m rate=3r/s;
    # General API: max 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # === Upstream ===
    upstream php-fpm {
        server unix:/run/php/php8.3-fpm.sock;
    }

    # === Virtual Hosts ===
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
