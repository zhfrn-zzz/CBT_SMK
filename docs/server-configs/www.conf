; =============================================================================
; PHP-FPM 8.3 Pool Configuration — CBT SMK LMS
; Server: Intel Xeon 20-core, 16GB RAM, HDD
; Available RAM for PHP-FPM: ~4.5 GB (after OS, MySQL, Redis, Reverb, Nginx)
; Path: /etc/php/8.3/fpm/pool.d/www.conf
; =============================================================================

[www]

; === User/Group ===
user = www-data
group = www-data

; === Listen ===
listen = /run/php/php8.3-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; === Process Manager ===
; STATIC is better for predictable exam load.
; Dynamic has fork/kill overhead that's unnecessary at peak.
pm = static

; Worker count: 4.5GB / ~35MB avg per worker = ~130 max.
; With 70% safety margin = 90 workers.
pm.max_children = 90

; === Max Requests (memory leak prevention) ===
; Recycle worker every 500 requests to prevent memory creep.
pm.max_requests = 500

; === Timeouts ===
; Auto-save must be fast (<1s). Submit can be ~5-10s (grading queue).
; Global timeout: 30s is sufficient.
request_terminate_timeout = 30s

; === Slow Log ===
slowlog = /var/log/php-fpm/slow.log
request_slowlog_timeout = 5s

; === Status Page (for monitoring) ===
pm.status_path = /fpm-status
pm.status_listen = 127.0.0.1:9001

; === Environment ===
; Pass environment variables from systemd
clear_env = no

; =============================================================================
; FALLBACK: If RAM is tight, switch to dynamic mode:
;
; pm = dynamic
; pm.max_children = 90
; pm.start_servers = 30
; pm.min_spare_servers = 20
; pm.max_spare_servers = 50
; pm.max_requests = 500
; =============================================================================
